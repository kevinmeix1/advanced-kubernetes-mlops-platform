apiVersion: v1
kind: ConfigMap
metadata:
  name: dra-advanced-device-sharing-examples
  namespace: mlops
data:
  prioritized-list-resourceclaimtemplate.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceClaimTemplate
    metadata:
      name: churn-canary-prioritized-accelerator
      namespace: mlops
    spec:
      spec:
        devices:
          requests:
            - name: canary-accelerator
              prioritizedList:
                - deviceClassName: gpu-a100-mig
                  count: 1
                - deviceClassName: gpu-l4-shared
                  count: 1
                - deviceClassName: cpu-burst
                  count: 1
  partitionable-resource-slice.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceSlice
    metadata:
      name: a100-partitionable-release-pool
    spec:
      driver: gpu.resource.kubernetes.io
      pool:
        name: a100-release-pool
        generation: 1
        resourceSliceCount: 1
      devices:
        - name: a100-parent-0
          partitionable: true
          attributes:
            model:
              string: A100
            partitioning:
              string: mig
  consumable-capacity-request.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceClaimTemplate
    metadata:
      name: batch-scoring-consumable-gpu
      namespace: mlops
    spec:
      spec:
        devices:
          requests:
            - name: scoring-vgpu-memory
              deviceClassName: partitionable-a100
              capacity:
                requests:
                  memory: 8Gi
              constraints:
                - distinctAttribute: device-id
  binding-conditions-resource-slice.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceSlice
    metadata:
      name: fabric-a100-release-analysis
    spec:
      driver: gpu.resource.kubernetes.io
      pool:
        name: fabric-a100-release-pool
        generation: 1
        resourceSliceCount: 1
      devices:
        - name: fabric-a100-0
          bindsToNode: true
          bindingConditions:
            - gpu.resource.kubernetes.io/is-prepared
          bindingFailureConditions:
            - gpu.resource.kubernetes.io/preparing-failed
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dra-advanced-device-sharing
  namespace: mlops
spec:
  groups:
    - name: dra.advanced.device.sharing
      rules:
        - alert: DRADeviceBindingWaitHigh
          expr: histogram_quantile(0.95, sum(rate(kube_scheduler_plugin_duration_seconds_bucket{plugin="DynamicResources",extension_point="PreBind"}[5m])) by (le)) > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DRA device binding conditions are slowing release analysis binding"
        - alert: DRAConsumableCapacityExhausted
          expr: sum(kube_resourceclaim_status_allocation_capacity{resource=~"memory|bandwidth"}) by (namespace, resource) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DRA consumable capacity is saturated for release or scoring workloads"
