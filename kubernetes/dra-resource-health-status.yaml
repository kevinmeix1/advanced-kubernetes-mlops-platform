apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dra-resource-health-reader
  namespace: mlops
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dra-resource-health-reader
  namespace: mlops
subjects:
  - kind: ServiceAccount
    name: airflow-release-runner
    namespace: mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dra-resource-health-reader
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dra-resource-health-queries
  namespace: mlops
data:
  pod-allocated-resources-status: "kubectl get pod churn-canary-dra-smoke-0 -n mlops -o jsonpath='{.status.containerStatuses[*].allocatedResourcesStatus}'"
  resourceclaim-device-status: "kubectl get resourceclaim l4-shared-canary-claim -n mlops -o jsonpath='{.status.devices}'"
  kubelet-podresources: "scrape kubelet PodResourcesLister DynamicResource claim_name and device_name for allocated devices"
---
apiVersion: resource.k8s.io/v1beta2
kind: DeviceTaintRule
metadata:
  name: quarantine-unhealthy-l4-canary-device
spec:
  deviceSelector:
    driver: gpu.resource.kubernetes.io
    deviceClassName: gpu-l4-shared
  taint:
    key: gpu.resource.kubernetes.io/unhealthy
    value: ResourceHealthStatus
    effect: NoSchedule
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dra-resource-health-status
  namespace: mlops
spec:
  groups:
    - name: dra.resource.health
      rules:
        - alert: DRAResourceHealthUnhealthy
          expr: kube_pod_container_status_allocated_resources_health{namespace="mlops",health=~"Unhealthy|Unknown"} > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "A release-critical DRA device is unhealthy or unknown"
        - alert: DRAResourceClaimDeviceStatusMissing
          expr: kube_resourceclaim_status_devices{namespace="mlops"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ResourceClaim status.devices is missing for a DRA-backed release workload"
