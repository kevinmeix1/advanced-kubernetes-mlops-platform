apiVersion: v1
kind: ConfigMap
metadata:
  name: churn-mlops-runtime-config
  namespace: mlops
data:
  MODEL_NAME: churn-risk
  MLFLOW_TRACKING_URI: http://mlflow.mlops.svc.cluster.local:5000
  FEATURE_CONTRACT: contracts/churn_training_contract.yml
  PROMOTION_POLICY: all-gates-must-pass
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: churn-mlops-runner
  namespace: mlops
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "get", "list", "watch", "patch"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: churn-mlops-runner
  namespace: mlops
subjects:
  - kind: ServiceAccount
    name: churn-risk-predictor
    namespace: mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: churn-mlops-runner
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: churn-retraining-daily
  namespace: mlops
  labels:
    app.kubernetes.io/name: kubernetes-mlops-platform
    app.kubernetes.io/component: retraining
spec:
  schedule: "15 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    metadata:
      labels:
        kueue.x-k8s.io/queue-name: churn-release-queue
        kueue.x-k8s.io/priority-class: release-critical
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kubernetes-mlops-platform
            app.kubernetes.io/component: retraining
        spec:
          serviceAccountName: churn-risk-predictor
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
          containers:
            - name: train-evaluate-promote
              image: ghcr.io/kevinmeix1/advanced-kubernetes-mlops-platform:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: churn-mlops-runtime-config
              command: ["bash", "-lc"]
              args:
                - "make train && make evaluate && make deploy && make monitor"
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: churn-backfill-example
  namespace: mlops
  labels:
    kueue.x-k8s.io/queue-name: churn-release-queue
    kueue.x-k8s.io/priority-class: release-critical
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: churn-risk-predictor
      restartPolicy: Never
      containers:
        - name: backfill
          image: ghcr.io/kevinmeix1/advanced-kubernetes-mlops-platform:latest
          command: ["bash", "-lc"]
          args:
            - "make train && make evaluate"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
