apiVersion: v1
kind: ConfigMap
metadata:
  name: mlops-otel-collector-config
  namespace: mlops
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 512
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
      attributes/semantic_redaction:
        actions:
          - key: prediction.request.features
            action: delete
          - key: prediction.response.score
            action: delete
          - key: http.request.body
            action: delete
          - key: customer.id
            action: delete
          - key: deployment.environment.name
            value: local-demo
            action: upsert
          - key: telemetry.contract.name
            value: ml-release-semantic-v1
            action: upsert
      batch:
        timeout: 5s
        send_batch_size: 256
    exporters:
      debug:
        verbosity: basic
      prometheus:
        endpoint: 0.0.0.0:9464
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, attributes/semantic_redaction, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, attributes/semantic_redaction, batch]
          exporters: [prometheus, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-otel-collector
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-otel-collector
  template:
    metadata:
      labels:
        app: mlops-otel-collector
    spec:
      serviceAccountName: churn-risk-predictor
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/conf/collector.yaml"]
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 9464
              name: prometheus
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: config
          configMap:
            name: mlops-otel-collector-config
