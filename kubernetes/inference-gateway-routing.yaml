apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: churn-inference-gateway
  namespace: mlops
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: churn-inference-route
  namespace: mlops
spec:
  parentRefs:
    - name: churn-inference-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/churn
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: churn-risk-inference-pool
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-model-server
  namespace: mlops
  labels:
    app: churn-model-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: churn-model-server
  template:
    metadata:
      labels:
        app: churn-model-server
        serving.kserve.io/model: churn-risk
    spec:
      containers:
        - name: model-server
          image: ghcr.io/kevinmeix1/churn-risk-server@sha256:replace-with-approved-digest
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-endpoint-picker
  namespace: mlops
  labels:
    app: churn-epp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-epp
  template:
    metadata:
      labels:
        app: churn-epp
    spec:
      containers:
        - name: epp
          image: registry.k8s.io/gateway-api-inference-extension/epp@sha256:replace-with-approved-digest
          args:
            - --pool-name
            - churn-risk-inference-pool
            - --pool-namespace
            - mlops
          ports:
            - name: ext-proc
              containerPort: 9002
            - name: grpc-health
              containerPort: 9003
            - name: metrics
              containerPort: 9090
          readinessProbe:
            grpc:
              port: 9003
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: churn-endpoint-picker
  namespace: mlops
spec:
  selector:
    app: churn-epp
  ports:
    - name: ext-proc
      protocol: TCP
      port: 9002
      targetPort: 9002
      appProtocol: http2
---
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: churn-risk-inference-pool
  namespace: mlops
spec:
  targetPorts:
    - number: 8000
  selector:
    app: churn-model-server
  endpointPickerRef:
    name: churn-endpoint-picker
    port:
      number: 9002
    failureMode: FailOpen
---
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: churn-online
  namespace: mlops
spec:
  priority: 20
  poolRef:
    group: inference.networking.k8s.io
    kind: InferencePool
    name: churn-risk-inference-pool
---
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: bulk-score-replay
  namespace: mlops
spec:
  priority: -5
  poolRef:
    group: inference.networking.k8s.io
    kind: InferencePool
    name: churn-risk-inference-pool
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: inference-gateway-routing
  namespace: mlops
spec:
  groups:
    - name: inference.gateway.routing
      rules:
        - alert: ChurnEndpointPickerUnavailable
          expr: up{job="churn-endpoint-picker"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Endpoint picker is unavailable; fail open to champion KServe route."
