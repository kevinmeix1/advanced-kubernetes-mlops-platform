apiVersion: v1
kind: Pod
metadata:
  name: airflow-mlops-worker-template
  namespace: mlops
  labels:
    app.kubernetes.io/name: kubernetes-mlops-platform
    app.kubernetes.io/component: airflow-worker-template
spec:
  serviceAccountName: churn-risk-predictor
  priorityClassName: mlops-release-critical
  restartPolicy: Never
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: kubernetes-mlops-platform
  initContainers:
    - name: wait-for-mlflow
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - "until curl -fsS http://mlflow.mlops.svc.cluster.local:5000/health || curl -fsS http://mlflow.mlops.svc.cluster.local:5000; do sleep 5; done"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
  containers:
    - name: base
      image: ghcr.io/kevinmeix1/advanced-kubernetes-mlops-platform:latest
      command: ["bash", "-lc", "make demo"]
      envFrom:
        - configMapRef:
            name: churn-mlops-runtime-config
      startupProbe:
        exec:
          command: ["python", "-m", "kube_mlops_platform", "health"]
        failureThreshold: 12
        periodSeconds: 5
      livenessProbe:
        exec:
          command: ["python", "-m", "kube_mlops_platform", "health"]
        periodSeconds: 30
      readinessProbe:
        exec:
          command: ["python", "-m", "kube_mlops_platform", "health"]
        periodSeconds: 15
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
