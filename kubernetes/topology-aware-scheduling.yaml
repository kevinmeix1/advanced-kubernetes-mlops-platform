apiVersion: kueue.x-k8s.io/v1beta2
kind: Topology
metadata:
  name: mlops-accelerator-topology
spec:
  levels:
    - nodeLabel: cloud.provider.com/topology-block
    - nodeLabel: cloud.provider.com/topology-rack
    - nodeLabel: kubernetes.io/hostname
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: gpu-l4-shared-tas
spec:
  nodeLabels:
    accelerator: nvidia-l4
  topologyName: mlops-accelerator-topology
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: AdmissionCheck
metadata:
  name: topology-provisioning-check
spec:
  controllerName: kueue.x-k8s.io/provisioning-request
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: mlops-topology-aware-release
spec:
  namespaceSelector: {}
  admissionChecks:
    - topology-provisioning-check
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: gpu-l4-shared-tas
          resources:
            - name: nvidia.com/gpu
              nominalQuota: 4
            - name: cpu
              nominalQuota: 32
            - name: memory
              nominalQuota: 128Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: churn-distributed-retraining-tas
  namespace: mlops
  labels:
    app.kubernetes.io/component: topology-aware-training
  annotations:
    kueue.x-k8s.io/queue-name: churn-release-queue
    kueue.x-k8s.io/podset-required-topology: cloud.provider.com/topology-rack
spec:
  completions: 8
  parallelism: 8
  completionMode: Indexed
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: train
          image: ghcr.io/kevinmeix1/churn-risk-trainer@sha256:replace-with-digest
          args: ["python", "-m", "kube_mlops_platform", "train", "--output", "/workspace"]
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-canary-predictor-ha
  namespace: mlops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: churn-canary-predictor
  template:
    metadata:
      labels:
        app: churn-canary-predictor
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: churn-canary-predictor
      containers:
        - name: predictor
          image: ghcr.io/kevinmeix1/churn-risk-canary@sha256:replace-with-digest
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mlops-topology-aware-scheduling
  namespace: mlops
spec:
  groups:
    - name: mlops.topology.scheduling
      rules:
        - alert: KueueTopologyAssignmentDelayed
          expr: kueue_pending_workloads{cluster_queue="mlops-topology-aware-release"} > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "A topology-aware training or release workload is waiting for a feasible rack-level assignment."
