apiVersion: batch/v1
kind: Job
metadata:
  name: release-retraining-job
  namespace: mlops
  annotations:
    platform.mlops.dev/feature-gate: MutablePodResourcesForSuspendedJobs
    platform.mlops.dev/resource-mutation-reason: kueue-quota-fit
spec:
  suspend: true
  completionMode: Indexed
  completions: 4
  parallelism: 4
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: ghcr.io/kevinmeix1/churn-trainer:2026.07
          resources:
            requests:
              cpu: "4"
              memory: 18Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: 24Gi
              nvidia.com/gpu: "1"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: batch-scoring-replay-job
  namespace: mlops
  annotations:
    platform.mlops.dev/feature-gate: MutablePodResourcesForSuspendedJobs
    platform.mlops.dev/resource-mutation-reason: airflow-pool-and-checkpoint-fit
spec:
  suspend: true
  completionMode: Indexed
  completions: 12
  parallelism: 6
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: scorer
          image: ghcr.io/kevinmeix1/churn-batch-scorer:2026.07
          resources:
            requests:
              cpu: "6"
              memory: 14Gi
            limits:
              cpu: "8"
              memory: 18Gi
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: suspended-job-resource-mutation-guard
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources: ["jobs"]
  validations:
    - expression: "!(has(oldObject) && oldObject.spec.template.spec.containers[0].resources != object.spec.template.spec.containers[0].resources && object.spec.suspend != true)"
      message: "MutablePodResourcesForSuspendedJobs allows resource mutation only while spec.suspend is true"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mlops-suspended-job-resources
  namespace: mlops
spec:
  groups:
    - name: mlops.suspended-job-resources
      rules:
        - alert: MLOpsSuspendedJobResizeStale
          expr: max(mlops_suspended_job_resource_patch_age_seconds{namespace="mlops"}) > 900
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Suspended Job resource mutation has not been unsuspended or reverted
        - alert: MLOpsSuspendedJobUnsuspendWithoutQuotaFit
          expr: max(mlops_suspended_job_unsuspend_without_quota_fit{namespace="mlops"}) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Job was unsuspended before quota and resource fit evidence was recorded
