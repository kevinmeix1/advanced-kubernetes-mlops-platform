apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: mlops-training-spot
spec:
  template:
    metadata:
      labels:
        workload-tier: training
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: mlops-default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  limits:
    cpu: "128"
    memory: 512Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: mlops-default
spec:
  role: eks-auto-mode-node-role
  subnetSelectorTerms:
    - tags:
        kubernetes.io/role/internal-elb: "1"
  securityGroupSelectorTerms:
    - tags:
        app.kubernetes.io/part-of: advanced-kubernetes-mlops-platform
  tags:
    cost-center: mlops-platform
    workload: training-serving
