apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: mlops-release-critical
value: 100000
globalDefault: false
description: "Priority for gated model release, rollback, and incident mitigation jobs."
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mlops-compute-quota
  namespace: mlops
  annotations:
    owner: ml-platform
    review-schedule: quarterly
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "40"
    count/jobs.batch: "20"
    count/cronjobs.batch: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: mlops-default-limits
  namespace: mlops
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 100m
        memory: 128Mi
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: churn-risk-route
  namespace: mlops
spec:
  parentRefs:
    - name: internal-ml-gateway
      namespace: platform-ingress
  hostnames:
    - churn-risk.internal.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v2/models/churn-risk
      backendRefs:
        - name: churn-risk-predictor
          port: 80
