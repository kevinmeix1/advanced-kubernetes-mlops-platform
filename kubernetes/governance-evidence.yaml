apiVersion: v1
kind: ConfigMap
metadata:
  name: churn-risk-governance-policy
  namespace: mlops
  labels:
    app.kubernetes.io/name: governance-evidence
    app.kubernetes.io/part-of: advanced-kubernetes-mlops-platform
data:
  required_evidence: |
    - model-card
    - data-card
    - risk-register
    - approval-record
    - reproducibility-manifest
  promotion_policy: |
    release requires data quality, model quality, segment gap, latency, and monitoring evidence
---
apiVersion: batch/v1
kind: Job
metadata:
  name: churn-risk-evidence-bundle
  namespace: mlops
  labels:
    app.kubernetes.io/name: governance-evidence
spec:
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: governance-evidence
    spec:
      restartPolicy: Never
      serviceAccountName: mlops-workload
      containers:
        - name: evidence
          image: ghcr.io/kevinmeix1/advanced-kubernetes-mlops-platform@sha256:replace-with-built-image-digest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "kube_mlops_platform", "governance-bundle", "--output", "/workspace"]
          env:
            - name: REQUIRED_EVIDENCE
              value: "model-card,data-card,risk-register,approval-record,reproducibility-manifest"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: churn-risk-quarterly-governance-review
  namespace: mlops
  labels:
    app.kubernetes.io/name: governance-evidence
spec:
  schedule: "0 9 1 */3 *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: review
              image: ghcr.io/kevinmeix1/advanced-kubernetes-mlops-platform@sha256:replace-with-built-image-digest
              command: ["python", "-m", "kube_mlops_platform", "governance-bundle", "--output", "/workspace"]
              resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
