apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: mlops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: mlops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-release-control-plane
  namespace: mlops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: release-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mlflow-registry
      ports:
        - protocol: TCP
          port: 5000
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kserve-controller
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-predictor-telemetry
  namespace: mlops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: churn-risk-predictor
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: mlops-strict-mtls
  namespace: mlops
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-airflow-release-operations
  namespace: mlops
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: release-controller
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/mlops/sa/airflow-worker
      to:
        - operation:
            methods: ["GET", "POST", "PATCH"]
            ports: ["443", "5000"]
