apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kueue-pending-workload-visibility
rules:
  - apiGroups:
      - visibility.kueue.x-k8s.io
    resources:
      - clusterqueues/pendingworkloads
      - localqueues/pendingworkloads
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kueue-pending-workload-visibility
subjects:
  - kind: ServiceAccount
    name: airflow-release-runner
    namespace: mlops-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kueue-pending-workload-visibility
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kueue-pending-workload-queries
  namespace: mlops-prod
data:
  clusterqueue-release.jsonpath: "/apis/visibility.kueue.x-k8s.io/v1beta2/clusterqueues/churn-release-tenant-queue/pendingworkloads"
  localqueue-release.jsonpath: "/apis/visibility.kueue.x-k8s.io/v1beta2/namespaces/mlops-prod/localqueues/release-validation/pendingworkloads"
  apf-install: "kubectl apply --server-side -f https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.2/visibility-apf.yaml"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kueue-pending-workload-visibility
  namespace: mlops-prod
spec:
  groups:
    - name: kueue-pending-workload-visibility
      rules:
        - alert: KueueReleaseAdmissionWaitHigh
          expr: histogram_quantile(0.95, sum(rate(kueue_admission_wait_time_seconds_bucket{cluster_queue="churn-release-tenant-queue"}[10m])) by (le)) > 600
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Release validation is waiting too long for Kueue admission"
        - alert: KueuePendingCpuHigh
          expr: sum(kueue_cluster_queue_resource_pending{cluster_queue=~"churn-release-tenant-queue|batch-scoring-tenant-queue",resource="cpu"}) > 24
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pending CPU in release or batch ClusterQueues is high"
