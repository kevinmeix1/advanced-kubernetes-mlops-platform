apiVersion: v1
kind: ConfigMap
metadata:
  name: churn-multikueue-runbook
  namespace: mlops
  labels:
    platform.openai.com/component: multikueue-dispatch
data:
  promotionPolicy: "Candidate promotion freezes unless release evidence Workloads have status.clusterName."
  championPolicy: "Preserve the current champion alias until MultiKueue dispatch evidence is complete."
  runbook.md: |
    MultiKueue manager cluster: mlops-release-manager.
    Worker clusters: release-training-east, release-scoring-west, release-gpu-canary.
    Watch status.nominatedClusterNames while the Workload is pending.
    Record status.clusterName after a worker admits the Workload.
    Remote Jobs are labeled kueue.x-k8s.io/prebuilt-workload-name by the manager.
    If dispatch stalls, freeze candidate promotion and run rollback smoke before batch scoring.
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: multicluster-release-fleet
spec:
  nodeLabels:
    nodepool.platform.openai.com/fleet: multikueue-release
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: AdmissionCheck
metadata:
  name: churn-release-multikueue
spec:
  controllerName: kueue.x-k8s.io/multikueue
  parameters:
    apiGroup: kueue.x-k8s.io
    kind: MultiKueueConfig
    name: churn-release-multikueue-config
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: MultiKueueConfig
metadata:
  name: churn-release-multikueue-config
spec:
  clusters:
    - release-training-east
    - release-scoring-west
    - release-gpu-canary
  quotaManagement: Manual
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: MultiKueueCluster
metadata:
  name: release-training-east
spec:
  clusterSource:
    kubeConfig:
      locationType: Secret
      location: release-training-east-kubeconfig
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: MultiKueueCluster
metadata:
  name: release-scoring-west
spec:
  clusterSource:
    kubeConfig:
      locationType: Secret
      location: release-scoring-west-kubeconfig
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: MultiKueueCluster
metadata:
  name: release-gpu-canary
spec:
  clusterSource:
    kubeConfig:
      locationType: Secret
      location: release-gpu-canary-kubeconfig
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: churn-multikueue-release
spec:
  namespaceSelector: {}
  queueingStrategy: BestEffortFIFO
  admissionChecksStrategy:
    admissionChecks:
      - name: churn-release-multikueue
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: multicluster-release-fleet
          resources:
            - name: cpu
              nominalQuota: "144"
            - name: memory
              nominalQuota: 704Gi
            - name: nvidia.com/gpu
              nominalQuota: "6"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: churn-multikueue-release
  namespace: mlops
spec:
  clusterQueue: churn-multikueue-release
---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: churn-candidate-training-
  namespace: mlops
  labels:
    kueue.x-k8s.io/queue-name: churn-multikueue-release
    kueue.x-k8s.io/priority-class: release-critical
    mlops.platform.openai.com/workload: candidate-training
spec:
  completionMode: Indexed
  completions: 8
  parallelism: 4
  backoffLimitPerIndex: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: churn-candidate-training
    spec:
      serviceAccountName: airflow-release-runner
      restartPolicy: Never
      containers:
        - name: trainer
          image: ghcr.io/kevinmeix1/churn-trainer@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
          command: ["python", "-m", "kube_mlops_platform.train_worker"]
          resources:
            requests:
              cpu: "8"
              memory: 24Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 24Gi
              nvidia.com/gpu: "1"
---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: churn-rollback-smoke-
  namespace: mlops
  labels:
    kueue.x-k8s.io/queue-name: churn-multikueue-release
    kueue.x-k8s.io/priority-class: release-critical
    mlops.platform.openai.com/workload: rollback-smoke
spec:
  completionMode: Indexed
  completions: 4
  parallelism: 2
  backoffLimitPerIndex: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: churn-rollback-smoke
    spec:
      serviceAccountName: airflow-release-runner
      restartPolicy: Never
      containers:
        - name: smoke
          image: ghcr.io/kevinmeix1/churn-release-runner@sha256:eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
          command: ["python", "-m", "kube_mlops_platform.rollback_smoke"]
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 8Gi
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mlops-multikueue-dispatch-alerts
  namespace: monitoring
spec:
  groups:
    - name: mlops.multikueue-dispatch
      rules:
        - alert: MLOpsMultiKueueDispatchStalled
          expr: histogram_quantile(0.95, sum by (le, cluster_queue) (rate(kueue_admission_checks_wait_time_seconds_bucket{cluster_queue="churn-multikueue-release"}[20m]))) > 1200 and kueue_pending_workloads{cluster_queue="churn-multikueue-release",status="active"} > 0
          for: 20m
          labels:
            severity: warning
            team: ml-platform
          annotations:
            summary: Churn release MultiKueue dispatch is stalled before a worker cluster is selected.
            runbook_url: https://github.com/kevinmeix1/advanced-kubernetes-mlops-platform/blob/main/docs/multikueue-dispatch.md
