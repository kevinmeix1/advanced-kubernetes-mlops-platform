apiVersion: v1
kind: ConfigMap
metadata:
  name: indexed-release-job-runbook
  namespace: mlops
  labels:
    app.kubernetes.io/name: kubernetes-mlops-platform
    platform.openai.com/component: indexed-job-resilience
data:
  airflowBackfillCreate: >-
    airflow backfill create --dag-id enterprise_kubernetes_mlops_release --from-date 2026-07-01 --to-date 2026-07-07 --reprocess-behavior failed --max-active-runs 2 --run-backwards
  shardContract: "JOB_COMPLETION_INDEX selects release validation, batch scoring, canary analysis, or rollback smoke work."
  recoveryPolicy: "Recover failedIndexes only; protect rollback smoke capacity before rerunning historical release evidence."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: churn-release-indexed-resilience
  namespace: mlops
  labels:
    app.kubernetes.io/name: kubernetes-mlops-platform
    app.kubernetes.io/component: indexed-job-resilience
    kueue.x-k8s.io/queue-name: churn-release-queue
    kueue.x-k8s.io/priority-class: release-critical
spec:
  parallelism: 6
  completions: 12
  completionMode: Indexed
  backoffLimitPerIndex: 1
  maxFailedIndexes: 2
  activeDeadlineSeconds: 5400
  ttlSecondsAfterFinished: 86400
  successPolicy:
    rules:
      - succeededCount: 10
  podFailurePolicy:
    rules:
      - action: Ignore
        onPodConditions:
          - type: DisruptionTarget
      - action: FailIndex
        onExitCodes:
          containerName: release-shard
          operator: In
          values: [42]
      - action: FailJob
        onExitCodes:
          containerName: release-shard
          operator: In
          values: [78, 126]
  template:
    metadata:
      labels:
        app.kubernetes.io/component: release-shard
        release-wave: indexed-resilience
    spec:
      serviceAccountName: airflow-release-runner
      restartPolicy: Never
      containers:
        - name: release-shard
          image: ghcr.io/kevinmeix1/advanced-kubernetes-mlops-platform:latest
          command: ["bash", "-lc"]
          args:
            - >-
              echo "running release shard ${JOB_COMPLETION_INDEX}" &&
              python -m kube_mlops_platform evaluate --output .local &&
              python -m kube_mlops_platform monitor --output .local
          env:
            - name: SHARD_SOURCE
              value: "JOB_COMPLETION_INDEX"
            - name: FAILURE_CONTRACT_EXIT_CODE
              value: "42"
          resources:
            requests:
              cpu: "750m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: indexed-release-job-alerts
  namespace: mlops
  labels:
    app.kubernetes.io/name: kubernetes-mlops-platform
    prometheus: platform
spec:
  groups:
    - name: mlops.indexed-job-resilience
      rules:
        - alert: ChurnIndexedJobFailedIndexesHigh
          expr: kube_job_status_failed{namespace="mlops",job_name=~"churn-release-indexed.*"} > 2
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Indexed release job exceeded failed-index budget.
            runbook: "Inspect status.failedIndexes and recover only failed release shards."
        - alert: ChurnIndexedJobShardRetryHigh
          expr: increase(kube_pod_container_status_restarts_total{namespace="mlops",container="release-shard"}[30m]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Release shard restart pressure is above the per-index retry budget.
            runbook: "Check podFailurePolicy matches before retries consume rollback quota."
        - alert: AirflowReleaseBackfillConcurrencySaturated
          expr: airflow_dagrun_running{dag_id="enterprise_kubernetes_mlops_release"} >= 2
          for: 20m
          labels:
            severity: warning
          annotations:
            summary: Airflow release backfill max_active_runs is saturated.
            runbook: "Protect live canary and rollback tasks before increasing historical recovery concurrency."
