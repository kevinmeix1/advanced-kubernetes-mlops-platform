apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: churn-predictor-vpa-recommender
  namespace: mlops
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: churn-risk-predictor
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["cpu", "memory"]
        minAllowed:
          cpu: 250m
          memory: 384Mi
        maxAllowed:
          cpu: "2"
          memory: 2Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: churn-predictor-hpa
  namespace: mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: churn-risk-predictor
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 768Mi
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-capacity-pools
  namespace: mlops
data:
  pools.json: |
    [
      {"name": "mlflow_registry", "slots": 2, "description": "Protect model registry during retraining and promotion"},
      {"name": "kserve_release", "slots": 4, "description": "Bound concurrent smoke tests and rollout checks"},
      {"name": "monitoring_jobs", "slots": 3, "description": "Keep drift checks from starving training workers"}
    ]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mlops-resource-optimization-alerts
  namespace: mlops
spec:
  groups:
    - name: mlops.resource.optimization
      rules:
        - alert: InferenceCpuThrottlingHigh
          expr: rate(container_cpu_cfs_throttled_periods_total{namespace="mlops"}[5m]) > 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Inference pods are CPU throttled; review request and CPU limit policy."
        - alert: TrainingRequestWasteHigh
          expr: avg(kube_pod_container_resource_requests{namespace="mlops", resource="cpu"}) > 2
          for: 30m
          labels:
            severity: info
          annotations:
            summary: "Training jobs may be over-requesting CPU; compare VPA recommendations before next backfill."
